{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add New Property — RK Admin</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { background: var(--bg); padding: 40px 24px; }
    .form-container {
      max-width: 600px;
      margin: 0 auto;
      background: var(--white);
      padding: 40px;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--border);
    }
    .form-header { margin-bottom: 32px; text-align: center; }
    .form-header h1 { font-size: 28px; margin-bottom: 8px; }
    .btn-submit { width: 100%; margin-top: 12px; }
    .back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--text-muted); font-size: 13px; margin-bottom: 24px; text-decoration: none; transition: color 0.2s; }
    .back-link:hover { color: var(--navy); }
  </style>
</head>
<body>

  <div class="form-container">
    <a href="{% url 'dashboard' %}" class="back-link">
      <i data-lucide="arrow-left" style="width: 14px;"></i> Back to Dashboard
    </a>
    
    <div class="form-header">
      <div class="section-tag">Property Inventory</div>
      <h1>Add New Listing</h1>
      <p style="font-size: 13px; color: var(--text-muted);">Enter property details to add it to the portal.</p>
    </div>

    <form method="POST">
      {% csrf_token %}
      <div class="form-group" style="margin-bottom: 20px;">
        <label>Property Title</label>
        <input type="text" name="title" placeholder="e.g. Luxury 3BHK Penthouse in Mohali" required>
      </div>

      <div class="form-group" style="margin-bottom: 20px;">
        <label>Location</label>
        <input type="text" name="location" placeholder="e.g. Sector 82, Mohali" required>
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
        <div class="form-group">
          <label>Price</label>
          <input type="text" name="price" placeholder="e.g. ₹1.2 Cr" required>
        </div>
        <div class="form-group">
          <label>Property Type</label>
          <select name="property_type" required>
            {% for code, label in property_choices %}
              <option value="{{ code }}">{{ label }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div class="form-group" style="margin-bottom: 24px;">
        <label>Detailed Description</label>
        <textarea name="description" placeholder="Mention key features, amenities, and floor plan details..." required></textarea>
      </div>

      <button type="submit" class="btn btn-submit">Save Property Listing</button>
    </form>
  </div>

  <script>lucide.createIcons();</script>
</body>
</html>
