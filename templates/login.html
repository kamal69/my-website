{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RKG Sovereign Realty — Login</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body{background:var(--bg);display:flex;align-items:center;justify-content:center;min-height:100vh;}
    .auth-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);padding:40px;width:100%;max-width:420px;box-shadow:var(--shadow-md);}
    .auth-logo{text-align:center;margin-bottom:28px;}
    .auth-logo img{height:70px;width:auto;margin:0 auto;}
    .auth-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;color:var(--text-primary);text-align:center;margin-bottom:6px;}
    .auth-sub{font-size:13px;color:var(--text-muted);text-align:center;margin-bottom:28px;}
    .error-msg{background:var(--red-bg);border:1px solid rgba(220,38,38,0.2);color:var(--red);padding:10px 14px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:18px;}
  </style>
</head>
<body>
<div class="auth-card">
  <div class="auth-logo">
    <img src="{% static 'images/rkg_logo.png' %}" alt="RKG Sovereign Realty">
  </div>
  <h2 class="auth-title">Welcome Back</h2>
  <p class="auth-sub">RKG Sovereign Realty — Building Royal Futures</p>
  {% if messages %}{% for message in messages %}<div class="error-msg">{{ message }}</div>{% endfor %}{% endif %}
  <form method="post" action="{% url 'login' %}">
    {% csrf_token %}
    <div class="form-group" style="margin-bottom:16px;"><label>Email Address</label><input type="email" name="email" placeholder="your@email.com" required></div>
    <div class="form-group" style="margin-bottom:24px;"><label>Password</label><input type="password" name="password" placeholder="••••••••" required></div>
    <button type="submit" class="btn" style="width:100%;padding:12px;">Login to My Account</button>
  </form>
  <p style="text-align:center;font-size:13px;color:var(--text-muted);margin-top:18px;">Don't have an account? <a href="{% url 'register' %}" style="color:var(--navy);font-weight:600;">Register</a></p>
  <p style="text-align:center;font-size:13px;color:var(--text-muted);margin-top:8px;"><a href="{% url 'index' %}" style="color:var(--text-muted);">← Back to Home</a></p>
</div>
<script>lucide.createIcons();</script>
</body>
</html>
